# Build and publish the container image to GHCR. Deployments (anywhere)
# reference these images; nothing platform-specific happens here.
#
# Tags produced:
#   main branch  -> :main, :latest, :sha-<short>
#   v* git tags  -> :<semver>, :<major>.<minor>

name: container

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so git describe yields real versions.
          fetch-depth: 0

      - id: provenance
        run: |
          echo "describe=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_DESCRIBE=${{ steps.provenance.outputs.describe }}
            GIT_SHA=${{ steps.provenance.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
